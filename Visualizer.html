<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engineering Console: Sort-O-Matic v1.0</title>
    <style>
        :root {
            --bg-color: #0b141d;
            --accent: #ffb703; /* UBC Gold */
            --bar-color: #002145; /* UBC Blue */
            --compare-color: #ff3c3c; /* Red for active comparison */
            --sorted-color: #4caf50; /* Green for finished */
        }

        body { font-family: 'Courier New', monospace; background: var(--bg-color); color: #e0e0e0; padding: 20px; }
        
        #control-panel {
            border: 1px solid var(--accent);
            padding: 15px; margin-bottom: 20px;
            display: flex; gap: 15px; align-items: center;
            background: rgba(255, 183, 3, 0.05);
        }

        .bar-container {
            display: flex;
            align-items: flex-end;
            height: 300px;
            gap: 2px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 5px;
        }

        .bar {
            background-color: var(--bar-color);
            border: 1px solid rgba(255,255,255,0.1);
            flex: 1;
            transition: height 0.1s ease;
        }

        button, select {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 8px; cursor: pointer;
        }

        .stats { margin-top: 15px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <<div id="control-panel">
    <button onclick="generateArray()">[ NEW DATA ]</button>
    <select id="algo-select">
        <option value="bubble">Bubble Sort</option>
        <option value="insertion">Insertion Sort</option>
        <option value="quick">Quick Sort</option>
        <option value="merge">Merge Sort</option>
    </select>
    <button id="start-btn" onclick="startSort()">> EXECUTE</button>
    <button id="stop-btn" onclick="stopSort()" style="color: #ff3c3c; border-color: #ff3c3c;">X STOP</button>
    <span>Speed:</span>
    <input type="range" id="speed" min="1" max="100" value="50">
</div>

    <div class="bar-container" id="container"></div>

    <div class="stats">
        [SYS] ALGO: <span id="current-algo">NONE</span> | 
        COMPARISONS: <span id="comp-count">0</span> | 
        SWAPS: <span id="swap-count">0</span>
    </div>

    <script src="sort.js"></script>
</body>
</html>
